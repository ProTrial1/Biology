<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Higher Biology: Plant Physiology Interactive Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #334155;
            margin: 0;
            padding: 0;
            overflow: hidden; 
        }
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            height: 350px;
            max-height: 400px;
        }
        @media (max-width: 768px) {
            .chart-container {
                height: 250px;
                max-height: 300px;
            }
        }
        .nav-item.active {
            background-color: #dcfce7;
            color: #166534;
            border-right: 4px solid #16a34a;
        }
        .nav-item:hover:not(.active) {
            background-color: #f1f5f9;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .concept-card {
            transition: all 0.2s ease;
        }
        .concept-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-color: #16a34a;
        }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row">

    <!-- Chosen Palette: Slate Neutrals with Green (Nature) and Amber (Energy) accents -->
    <!-- Application Structure Plan: A module-based dashboard layout. The sidebar provides constant access to the 5 main topics of the syllabus. The main content area dynamically updates to show subtopics, interactive diagrams (using HTML/CSS), and data visualizations (Chart.js) relevant to the selected module. This chunking of information prevents cognitive overload and allows students to focus on one physiological system at a time. -->
    <!-- Visualization & Content Choices: 
         1. Intro: Text - Sets context.
         2. Water Relations: Interactive HTML/CSS flow diagram -> Goal: Organize/Inform -> Shows pathways (apoplastic/symplastic) without SVG.
         3. Mineral Nutrition: Chart.js Bar Chart -> Goal: Compare -> Visually distinguishes macronutrient vs micronutrient relative demand conceptually.
         4. Photosynthesis: Interactive Toggles -> Goal: Compare -> Switches text/stats between C3/C4/CAM easily.
         5. Growth/Regulation: Interactive List/Detail view -> Goal: Organize -> Select a hormone to see its specific effects.
         6. Environment/Defense: Action buttons -> Goal: Change/Inform -> Click a stressor to reveal the plant's defense mechanism.
         Libraries: Vanilla JS for state/DOM manipulation, Chart.js for nutrition chart.
    -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->

    <nav class="w-full md:w-72 bg-white border-r border-slate-200 flex flex-col h-auto md:h-full z-10 shadow-sm flex-shrink-0">
        <div class="p-6 border-b border-slate-100">
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight flex items-center">
                <span class="text-green-600 mr-2">&#127807;</span> Bio <i>Interactive</i>
            </h1>
            <p class="text-sm text-slate-500 mt-1">Higher Plant Physiology</p>
        </div>
        
        <div class="md:hidden p-4 border-b border-slate-100">
            <select id="mobile-nav" class="w-full p-2 border border-slate-300 rounded-md bg-slate-50 text-slate-700 focus:outline-none focus:ring-2 focus:ring-green-500">
                <option value="intro">Welcome & Overview</option>
                <option value="water">1. Plant Water Relations</option>
                <option value="nutrition">2. Mineral Nutrition</option>
                <option value="photosynthesis">3. Photosynthesis & Respiration</option>
                <option value="growth">4. Growth & Regulation</option>
                <option value="defense">5. Environment & Defense</option>
            </select>
        </div>

        <ul class="flex-1 overflow-y-auto custom-scrollbar hidden md:block py-4" id="desktop-nav">
            <li class="px-2 mb-1">
                <button data-target="intro" class="nav-item active w-full text-left px-4 py-3 rounded-md font-medium transition-colors duration-150 flex items-center">
                    <span class="w-6 text-center mr-2">&#128214;</span> Overview
                </button>
            </li>
            <li class="px-2 mb-1">
                <button data-target="water" class="nav-item w-full text-left px-4 py-3 rounded-md font-medium transition-colors duration-150 flex items-center">
                    <span class="w-6 text-center mr-2 text-blue-500">&#128167;</span> 1. Water Relations
                </button>
            </li>
            <li class="px-2 mb-1">
                <button data-target="nutrition" class="nav-item w-full text-left px-4 py-3 rounded-md font-medium transition-colors duration-150 flex items-center">
                    <span class="w-6 text-center mr-2 text-amber-500">&#129466;</span> 2. Mineral Nutrition
                </button>
            </li>
            <li class="px-2 mb-1">
                <button data-target="photosynthesis" class="nav-item w-full text-left px-4 py-3 rounded-md font-medium transition-colors duration-150 flex items-center">
                    <span class="w-6 text-center mr-2 text-yellow-500">&#9728;&#65039;</span> 3. Photosynthesis
                </button>
            </li>
            <li class="px-2 mb-1">
                <button data-target="growth" class="nav-item w-full text-left px-4 py-3 rounded-md font-medium transition-colors duration-150 flex items-center">
                    <span class="w-6 text-center mr-2 text-green-500">&#127793;</span> 4. Growth & Reg.
                </button>
            </li>
            <li class="px-2 mb-1">
                <button data-target="defense" class="nav-item w-full text-left px-4 py-3 rounded-md font-medium transition-colors duration-150 flex items-center">
                    <span class="w-6 text-center mr-2 text-red-400">&#128737;&#65039;</span> 5. Environment
                </button>
            </li>
        </ul>
        <div class="p-4 border-t border-slate-100 text-xs text-slate-400 text-center">
            Interactive Study Guide Workspace
        </div>
    </nav>

    <main class="flex-1 overflow-y-auto custom-scrollbar bg-slate-50 p-4 md:p-10" id="main-content">
        <!-- Content injected here via JS -->
    </main>

    <script>
        const studyData = {
            intro: {
                title: "Higher Biology: Plant Physiology",
                subtitle: "Interactive Study Material",
                description: "This application provides an interactive exploration of core plant physiology concepts required for Higher Biology. Use the navigation menu to delve into specific physiological processes, structures, and regulatory mechanisms.",
                content: `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
                        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                            <h3 class="text-lg font-semibold text-slate-800 mb-2 border-b border-slate-100 pb-2">Course Objectives</h3>
                            <ul class="list-disc pl-5 text-slate-600 space-y-2 mt-4 text-sm">
                                <li>Understand physical mechanisms of water and nutrient transport.</li>
                                <li>Analyze bioenergetic pathways: Photosynthesis and Respiration.</li>
                                <li>Evaluate the role of phytohormones in development.</li>
                                <li>Examine plant responses to environmental stressors and pathogens.</li>
                            </ul>
                        </div>
                        <div class="bg-green-50 p-6 rounded-xl border border-green-100 shadow-sm flex flex-col justify-center items-center text-center">
                            <div class="text-4xl mb-4">&#128269;</div>
                            <h3 class="text-lg font-semibold text-green-800 mb-2">How to use this guide</h3>
                            <p class="text-green-700 text-sm">Select a topic from the sidebar. Interact with diagrams, review comparative charts, and click through sub-topics to reveal detailed physiological mechanisms.</p>
                        </div>
                    </div>
                `
            },
            water: {
                title: "1. Plant Water Relations",
                subtitle: "Movement and retention of water in plant systems.",
                description: "This module covers the physical principles governing water movement, from root absorption to foliar transpiration, and how plants manage water stress.",
                content: `
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">
                        <div class="space-y-4">
                            <div class="concept-card bg-white p-5 rounded-lg border border-slate-200 border-l-4 border-l-blue-500 cursor-pointer" onclick="updateWaterDetail('potential')">
                                <h4 class="font-bold text-slate-800 flex items-center"><span class="text-xl mr-2">&#8706;</span> Water Potential (Ψ)</h4>
                                <p class="text-sm text-slate-600 mt-1">The potential energy of water per unit volume relative to pure water. Dictates the direction of water movement.</p>
                            </div>
                            <div class="concept-card bg-white p-5 rounded-lg border border-slate-200 border-l-4 border-l-blue-400 cursor-pointer" onclick="updateWaterDetail('absorption')">
                                <h4 class="font-bold text-slate-800 flex items-center"><span class="text-xl mr-2">&#127793;</span> Absorption Pathways</h4>
                                <p class="text-sm text-slate-600 mt-1">Mechanisms of water/nutrient uptake at the root level via Apoplastic and Symplastic routes.</p>
                            </div>
                            <div class="concept-card bg-white p-5 rounded-lg border border-slate-200 border-l-4 border-l-blue-300 cursor-pointer" onclick="updateWaterDetail('transpiration')">
                                <h4 class="font-bold text-slate-800 flex items-center"><span class="text-xl mr-2">&#128328;</span> Transpiration</h4>
                                <p class="text-sm text-slate-600 mt-1">Loss of water vapor from leaves. Driven by Cohesion-Tension theory and regulated by stomata.</p>
                            </div>
                            <div class="concept-card bg-white p-5 rounded-lg border border-slate-200 border-l-4 border-l-amber-500 cursor-pointer" onclick="updateWaterDetail('stress')">
                                <h4 class="font-bold text-slate-800 flex items-center"><span class="text-xl mr-2">&#9888;&#65039;</span> Water Stress</h4>
                                <p class="text-sm text-slate-600 mt-1">Plant responses to drought, salinity, and deficits.</p>
                            </div>
                        </div>
                        
                        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex flex-col h-full" id="water-detail-pane">
                            <div class="text-center text-slate-400 mt-20">
                                <div class="text-5xl mb-4">&#128072;</div>
                                <p>Select a concept card to view details</p>
                            </div>
                        </div>
                    </div>
                `
            },
            nutrition: {
                title: "2. Mineral Nutrition & Transport",
                subtitle: "Acquisition and distribution of essential elements.",
                description: "Explore how plants obtain necessary macronutrients and micronutrients from the soil, assimilate them into biological molecules, and translocate sugars via the phloem.",
                content: `
                    <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm mb-6">
                        <h3 class="text-lg font-semibold mb-4 text-slate-800">Relative Nutrient Requirements</h3>
                        <p class="text-sm text-slate-500 mb-4">A conceptual comparison showing the massive difference in plant demand between Macronutrients (needed for structure/energy) and Micronutrients (needed for enzymatic functions).</p>
                        <div class="chart-container">
                            <canvas id="nutritionChart"></canvas>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-white p-5 rounded-lg border border-slate-200 shadow-sm">
                            <h4 class="font-bold text-slate-800 mb-2 border-b pb-1 text-sm uppercase tracking-wide text-amber-600">Uptake & Assimilation</h4>
                            <p class="text-sm text-slate-600 mb-2"><strong>Ion Transport:</strong> Requires proton pumps to move ions across cell membranes against concentration gradients.</p>
                            <p class="text-sm text-slate-600"><strong>Assimilation:</strong> Conversion of inorganic nutrients (Nitrate/Ammonium, SO4, PO4) into organic compounds (amino acids, ATP).</p>
                        </div>
                        <div class="bg-white p-5 rounded-lg border border-slate-200 shadow-sm col-span-1 md:col-span-2">
                            <h4 class="font-bold text-slate-800 mb-2 border-b pb-1 text-sm uppercase tracking-wide text-green-600">Phloem Translocation (Pressure-Flow)</h4>
                            <div class="flex flex-col sm:flex-row items-center gap-4 mt-4">
                                <div class="flex-1 text-center p-3 bg-green-50 rounded border border-green-100">
                                    <span class="block font-bold text-green-700">SOURCE (Leaf)</span>
                                    <span class="text-xs text-slate-600">Active loading of sucrose lowers water potential, drawing in water from xylem. High pressure.</span>
                                </div>
                                <div class="text-2xl text-slate-400">&#8594;</div>
                                <div class="flex-1 text-center p-3 bg-slate-50 rounded border border-slate-200">
                                    <span class="block font-bold text-slate-700">PHLOEM</span>
                                    <span class="text-xs text-slate-600">Bulk flow of sap driven by positive pressure gradient.</span>
                                </div>
                                <div class="text-2xl text-slate-400">&#8594;</div>
                                <div class="flex-1 text-center p-3 bg-amber-50 rounded border border-amber-100">
                                    <span class="block font-bold text-amber-700">SINK (Root/Fruit)</span>
                                    <span class="text-xs text-slate-600">Unloading of sucrose increases water potential. Water exits back to xylem. Low pressure.</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `
            },
            photosynthesis: {
                title: "3. Photosynthesis & Respiration",
                subtitle: "Bioenergetics and carbon fixation strategies.",
                description: "This section compares the different mechanisms plants use to fix carbon based on their environmental adaptations, and details cellular respiration.",
                content: `
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm mb-6 flex space-x-2 overflow-x-auto custom-scrollbar">
                        <button onclick="updateCarbonFixation('C3')" id="btn-C3" class="px-4 py-2 rounded-md bg-green-600 text-white font-medium text-sm whitespace-nowrap transition-colors">C3 Plants (Standard)</button>
                        <button onclick="updateCarbonFixation('C4')" id="btn-C4" class="px-4 py-2 rounded-md bg-slate-100 text-slate-600 font-medium text-sm whitespace-nowrap transition-colors hover:bg-slate-200">C4 Plants (Spatial)</button>
                        <button onclick="updateCarbonFixation('CAM')" id="btn-CAM" class="px-4 py-2 rounded-md bg-slate-100 text-slate-600 font-medium text-sm whitespace-nowrap transition-colors hover:bg-slate-200">CAM Plants (Temporal)</button>
                        <div class="w-px bg-slate-300 mx-2"></div>
                        <button onclick="updateCarbonFixation('Resp')" id="btn-Resp" class="px-4 py-2 rounded-md bg-slate-800 text-white font-medium text-sm whitespace-nowrap transition-colors">Respiration</button>
                    </div>

                    <div id="bioenergetics-display" class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm min-h-[300px]">
                        <!-- Populated by JS -->
                    </div>
                `
            },
            growth: {
                title: "4. Growth, Development & Regulation",
                subtitle: "Hormonal control and environmental responses.",
                description: "Understand how internal chemical signals (phytohormones) and external stimuli (light, gravity) regulate plant developmental stages.",
                content: `
                    <div class="space-y-8 mt-6">
                        <!-- Hormones -->
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div class="col-span-1 border border-slate-200 rounded-xl overflow-hidden shadow-sm bg-white">
                                <div class="bg-slate-100 px-4 py-3 border-b border-slate-200"><h4 class="font-bold text-slate-700">Phytohormones</h4></div>
                                <ul class="divide-y divide-slate-100">
                                    <li><button onclick="showHormone('Auxins')" class="w-full text-left px-4 py-3 hover:bg-green-50 hover:text-green-700 transition-colors">Auxins</button></li>
                                    <li><button onclick="showHormone('Gibberellins')" class="w-full text-left px-4 py-3 hover:bg-green-50 hover:text-green-700 transition-colors">Gibberellins</button></li>
                                    <li><button onclick="showHormone('Cytokinins')" class="w-full text-left px-4 py-3 hover:bg-green-50 hover:text-green-700 transition-colors">Cytokinins</button></li>
                                    <li><button onclick="showHormone('Ethylene')" class="w-full text-left px-4 py-3 hover:bg-amber-50 hover:text-amber-700 transition-colors">Ethylene</button></li>
                                    <li><button onclick="showHormone('ABA')" class="w-full text-left px-4 py-3 hover:bg-red-50 hover:text-red-700 transition-colors">Abscisic Acid (ABA)</button></li>
                                </ul>
                            </div>
                            <div class="col-span-1 lg:col-span-2">
                                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm h-full flex flex-col justify-center" id="hormone-display">
                                    <h4 class="text-xl font-bold text-slate-800 mb-2">Select a Hormone</h4>
                                    <p class="text-slate-500">Click a phytohormone on the left to reveal its specific mechanisms in growth regulation.</p>
                                </div>
                            </div>
                        </div>

                        <!-- Tropisms & Photoperiodism -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <!-- Tropisms -->
                            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                                <h4 class="font-bold text-slate-800 mb-4 border-b pb-2 text-sm uppercase">Tropisms (Directional Growth)</h4>
                                <div class="flex flex-wrap gap-2 mb-4">
                                    <button onclick="showTropism('photo')" class="px-3 py-1 bg-yellow-100 text-yellow-800 rounded text-sm hover:bg-yellow-200 transition-colors">Phototropism</button>
                                    <button onclick="showTropism('gravi')" class="px-3 py-1 bg-emerald-100 text-emerald-800 rounded text-sm hover:bg-emerald-200 transition-colors">Gravitropism</button>
                                    <button onclick="showTropism('thigmo')" class="px-3 py-1 bg-blue-100 text-blue-800 rounded text-sm hover:bg-blue-200 transition-colors">Thigmotropism</button>
                                </div>
                                <div id="tropism-display" class="text-sm text-slate-600 bg-slate-50 p-4 rounded border border-slate-100 min-h-[140px] flex items-center">
                                    Select a tropism type above to view its physiological mechanism.
                                </div>
                            </div>
                            <!-- Photoperiodism -->
                            <div class="bg-slate-800 text-white p-6 rounded-xl shadow-sm">
                                <h4 class="font-bold text-yellow-400 mb-4 border-b border-slate-600 pb-2 text-sm uppercase">Photoperiodism & Phytochrome</h4>
                                <p class="text-sm text-slate-300 mb-3">Plants measure day/night length to coordinate seasonal responses like flowering.</p>
                                <div class="space-y-3 text-sm text-slate-300">
                                    <p><strong>The Phytochrome Switch:</strong> A photoreceptor pigment existing in two reversible states:</p>
                                    <ul class="list-disc pl-5 space-y-1">
                                        <li><strong>Pr (Red light absorbing):</strong> Inactive form. Synthesized in dark.</li>
                                        <li><strong>Pfr (Far-red light absorbing):</strong> Active form. Pr converts to Pfr quickly in daylight. Pfr reverts to Pr slowly during the long night.</li>
                                    </ul>
                                    <div class="mt-2 text-xs bg-slate-700 p-3 rounded border border-slate-600">
                                        <em>The remaining ratio of Pfr tells the plant the length of the night. This critical night length regulates flowering in Short-Day and Long-Day plants.</em>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Developmental Stages -->
                        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                            <h4 class="font-bold text-slate-800 mb-4 border-b pb-2 text-sm uppercase">Developmental Stages</h4>
                            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                <div class="p-4 bg-slate-50 border border-slate-200 rounded-lg">
                                    <strong class="text-slate-800 block mb-2 text-sm">1. Seed Dormancy</strong>
                                    <p class="text-xs text-slate-600">Maintained by high ABA levels. Prevents premature sprouting during adverse conditions. Broken by specific environmental cues like sustained cold or light.</p>
                                </div>
                                <div class="p-4 bg-green-50 border border-green-200 rounded-lg">
                                    <strong class="text-green-800 block mb-2 text-sm">2. Germination</strong>
                                    <p class="text-xs text-slate-600">Initiated by imbibition (water uptake). GA is released, stimulating alpha-amylase production to mobilize endosperm starches, feeding the emerging embryo.</p>
                                </div>
                                <div class="p-4 bg-blue-50 border border-blue-200 rounded-lg">
                                    <strong class="text-blue-800 block mb-2 text-sm">3. Vegetative Growth</strong>
                                    <p class="text-xs text-slate-600">Root and shoot apical meristems drive primary growth. Leaves develop for maximum photosynthetic resource accumulation.</p>
                                </div>
                                <div class="p-4 bg-pink-50 border border-pink-200 rounded-lg">
                                    <strong class="text-pink-800 block mb-2 text-sm">4. Reproductive</strong>
                                    <p class="text-xs text-slate-600">Transition of shoot meristem to floral meristem. Triggered by photoperiod (florigen signal) or temperature (vernalization) to produce flowers/fruit.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `
            },
            defense: {
                title: "5. Environmental Physiology & Defense",
                subtitle: "Adaptation to stress and biological interactions.",
                description: "Investigate how plants react to abiotic environmental stressors and their biotic defense mechanisms against pathogens, as well as beneficial symbiotic relationships.",
                content: `
                    <div class="space-y-8 mt-6">
                        <!-- Environmental Stressors -->
                        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                            <h3 class="font-bold text-slate-800 mb-4 border-b pb-2 text-sm uppercase">Environmental Stress Simulator</h3>
                            <div class="flex flex-wrap gap-2 mb-4">
                                <button onclick="triggerStress('heat')" class="px-3 py-2 bg-red-100 text-red-700 rounded text-sm font-medium hover:bg-red-200 transition-colors">Heat / Drought</button>
                                <button onclick="triggerStress('cold')" class="px-3 py-2 bg-cyan-100 text-cyan-700 rounded text-sm font-medium hover:bg-cyan-200 transition-colors">Cold Extremes</button>
                                <button onclick="triggerStress('wind')" class="px-3 py-2 bg-slate-200 text-slate-700 rounded text-sm font-medium hover:bg-slate-300 transition-colors">Wind / Air</button>
                                <button onclick="triggerStress('light')" class="px-3 py-2 bg-yellow-100 text-yellow-700 rounded text-sm font-medium hover:bg-yellow-200 transition-colors">Light Quality</button>
                                <button onclick="triggerStress('pathogen')" class="px-3 py-2 bg-purple-100 text-purple-700 rounded text-sm font-medium hover:bg-purple-200 transition-colors">Pathogen Attack</button>
                                <button onclick="triggerStress('herbivore')" class="px-3 py-2 bg-amber-100 text-amber-700 rounded text-sm font-medium hover:bg-amber-200 transition-colors">Herbivory</button>
                            </div>
                            <div id="stress-response-display" class="p-5 bg-slate-50 rounded border border-slate-200 min-h-[140px] transition-all flex items-center">
                                <p class="text-slate-500 text-sm w-full text-center">Click a stress factor above to analyze the plant's specific physiological response.</p>
                            </div>
                        </div>

                        <!-- Chemical Defense & Microbes -->
                        <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
                            <!-- Secondary Metabolites -->
                            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm border-t-4 border-t-red-400 h-full">
                                <h4 class="font-bold text-slate-800 mb-4 border-b pb-2 text-sm uppercase">Defense Mechanisms (Secondary Metabolites)</h4>
                                <div class="space-y-4 text-sm text-slate-600">
                                    <div class="bg-slate-50 p-3 rounded border border-slate-100">
                                        <strong class="text-slate-800 block mb-1 flex items-center"><span class="mr-2">🌿</span> Terpenes / Terpenoids</strong>
                                        <p class="text-xs">Largest class of secondary metabolites (e.g., essential oils). Act as direct toxins to feeding insects or as volatile signals (VOCs) to attract predators of the herbivores.</p>
                                    </div>
                                    <div class="bg-slate-50 p-3 rounded border border-slate-100">
                                        <strong class="text-slate-800 block mb-1 flex items-center"><span class="mr-2">🍂</span> Phenolics</strong>
                                        <p class="text-xs">Includes <strong>tannins</strong> (bind to salivary proteins, making leaves indigestible), <strong>lignin</strong> (tough physical barrier in cell walls to block pathogens), and <strong>flavonoids</strong> (UV protection and antimicrobial).</p>
                                    </div>
                                    <div class="bg-slate-50 p-3 rounded border border-slate-100">
                                        <strong class="text-slate-800 block mb-1 flex items-center"><span class="mr-2">☕</span> Nitrogen-Containing Compounds</strong>
                                        <p class="text-xs">Includes <strong>alkaloids</strong> (like caffeine, nicotine, morphine) which heavily affect herbivore nervous systems, and cyanogenic glycosides which release cyanide when the plant tissue is chewed.</p>
                                    </div>
                                </div>
                            </div>

                            <!-- Plant-Microbe Interactions -->
                            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm border-t-4 border-t-blue-500 h-full">
                                <h4 class="font-bold text-slate-800 mb-4 border-b pb-2 text-sm uppercase">Plant-Microbe Interactions</h4>
                                <div class="space-y-4 text-sm text-slate-600">
                                    <div class="bg-blue-50 p-4 rounded-lg border border-blue-100">
                                        <strong class="text-blue-800 block mb-2 text-base">Biological Nitrogen Fixation</strong>
                                        <p class="mb-2">Symbiosis between legume roots and <em>Rhizobia</em> bacteria inside specialized root <strong>nodules</strong>.</p>
                                        <ul class="list-disc pl-4 text-xs space-y-1 text-blue-900">
                                            <li>Bacteria convert atmospheric N2 into usable ammonia (NH3) via nitrogenase.</li>
                                            <li>Plant provides sugars and a low-oxygen environment (using leghemoglobin) necessary to protect the oxygen-sensitive nitrogenase enzyme.</li>
                                        </ul>
                                    </div>
                                    <div class="bg-emerald-50 p-4 rounded-lg border border-emerald-100">
                                        <strong class="text-emerald-800 block mb-2 text-base">Mycorrhizal Associations</strong>
                                        <p class="mb-2">Mutualistic relationship with soil fungi acting as an extension of the root system.</p>
                                        <ul class="list-disc pl-4 text-xs space-y-1 text-emerald-900">
                                            <li><strong>Benefit to Plant:</strong> Fungal hyphae dramatically increase surface area, drastically improving absorption of water and <em>Phosphorus</em>.</li>
                                            <li><strong>Benefit to Fungus:</strong> Receives a steady supply of carbohydrates from plant photosynthesis.</li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `
            }
        };

        const waterDetails = {
            potential: `
                <h4 class="text-xl font-bold text-slate-800 mb-3 border-b pb-2">Water Potential (Ψ)</h4>
                <div class="space-y-3 text-slate-600 text-sm">
                    <p>Water moves from regions of <strong>higher</strong> water potential to regions of <strong>lower</strong> (more negative) water potential.</p>
                    <div class="bg-slate-50 p-3 rounded border border-slate-200 font-mono text-xs text-center">
                        Ψ = Ψs + Ψp
                    </div>
                    <ul class="list-disc pl-5 space-y-1">
                        <li><strong>Solute Potential (Ψs):</strong> Also called osmotic potential. Adding solutes always lowers Ψs (makes it negative).</li>
                        <li><strong>Pressure Potential (Ψp):</strong> The physical pressure on a solution. Turgor pressure in living plant cells is typically positive.</li>
                    </ul>
                </div>
            `,
            absorption: `
                <h4 class="text-xl font-bold text-slate-800 mb-3 border-b pb-2">Root Absorption Pathways</h4>
                <div class="space-y-3 text-slate-600 text-sm">
                    <p>Water travels through the root cortex towards the vascular cylinder via two main routes:</p>
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <div class="bg-blue-50 p-2 rounded border border-blue-100">
                            <strong class="text-blue-800 block mb-1">Apoplastic Route</strong>
                            Water moves through continuous cell walls and extracellular spaces. Blocked by the Casparian strip at the endodermis.
                        </div>
                        <div class="bg-green-50 p-2 rounded border border-green-100">
                            <strong class="text-green-800 block mb-1">Symplastic Route</strong>
                            Water moves through the cytosol, crossing from cell to cell via plasmodesmata.
                        </div>
                    </div>
                </div>
            `,
            transpiration: `
                <h4 class="text-xl font-bold text-slate-800 mb-3 border-b pb-2">Transpiration Mechanism</h4>
                <div class="space-y-3 text-slate-600 text-sm">
                    <p><strong>Cohesion-Tension Theory:</strong></p>
                    <ol class="list-decimal pl-5 space-y-1">
                        <li>Water evaporates from mesophyll cell walls in leaves.</li>
                        <li>This creates a negative pressure (tension) in the leaf xylem.</li>
                        <li>Due to hydrogen bonding (cohesion between water molecules), this tension pulls a continuous column of water up from the roots.</li>
                    </ol>
                    <p class="mt-3"><strong>Guard Cell Function:</strong> Potassium (K+) uptake causes water to enter guard cells via osmosis, making them turgid and opening the stomatal pore.</p>
                </div>
            `,
            stress: `
                <h4 class="text-xl font-bold text-amber-700 mb-3 border-b pb-2">Water Stress Responses</h4>
                <div class="space-y-3 text-slate-600 text-sm">
                    <p>Plants deploy strategies to survive water deficits and salinity:</p>
                    <ul class="list-disc pl-5 space-y-2">
                        <li><strong>Stomatal Closure:</strong> Triggered by ABA to prevent immediate water loss.</li>
                        <li><strong>Osmotic Adjustment:</strong> Synthesizing compatible solutes (e.g., proline) to lower internal solute potential, allowing water uptake from dry/salty soil.</li>
                        <li><strong>Morphological Changes:</strong> Increased root-to-shoot ratio, leaf rolling, or leaf shedding (abscission) in severe drought.</li>
                    </ul>
                </div>
            `
        };

        const bioenergeticsDetails = {
            'C3': {
                title: "C3 Photosynthesis",
                subtitle: "The standard mechanism used by most plants (e.g., wheat, rice).",
                content: `
                    <div class="flex flex-col md:flex-row gap-6 mt-4">
                        <div class="flex-1 space-y-2">
                            <p class="text-sm text-slate-600"><strong>Process:</strong> CO2 is directly incorporated into a 3-carbon compound (3-PGA) via the enzyme Rubisco during the Calvin Cycle.</p>
                            <p class="text-sm text-slate-600"><strong>Light Reactions:</strong> Occur in thylakoids (Photophosphorylation). Produces ATP and NADPH.</p>
                            <p class="text-sm text-slate-600"><strong>Calvin Cycle:</strong> Occurs in the stroma. Uses ATP/NADPH to fix CO2 into sugars.</p>
                        </div>
                        <div class="flex-1 bg-red-50 p-4 rounded border border-red-100">
                            <strong class="text-red-700 block text-sm mb-1">&#9888;&#65039; The Problem: Photorespiration</strong>
                            <p class="text-xs text-slate-700">In hot/dry conditions, stomata close. O2 builds up. Rubisco binds O2 instead of CO2, wasting energy and carbon. C3 plants are inefficient in hot climates.</p>
                        </div>
                    </div>
                `
            },
            'C4': {
                title: "C4 Photosynthesis",
                subtitle: "Spatial separation of carbon fixation (e.g., corn, sugarcane).",
                content: `
                    <div class="flex flex-col md:flex-row gap-6 mt-4">
                        <div class="flex-1 space-y-2">
                            <p class="text-sm text-slate-600"><strong>Adaptation:</strong> Overcomes photorespiration by physically separating initial CO2 fixation from the Calvin cycle.</p>
                            <ul class="list-disc pl-5 text-sm text-slate-600 space-y-1">
                                <li><strong>Mesophyll Cells:</strong> PEP carboxylase (ignores O2) fixes CO2 into a 4-carbon acid.</li>
                                <li><strong>Bundle-Sheath Cells:</strong> 4-C acid is transported here and decarboxylated, creating a high CO2 concentration around Rubisco for the Calvin cycle.</li>
                            </ul>
                        </div>
                        <div class="flex-1 bg-green-50 p-4 rounded border border-green-100 flex items-center justify-center text-center">
                            <p class="text-sm font-medium text-green-800">Highly efficient in hot, sunny environments. Prevents photorespiration at the cost of extra ATP to transport acids.</p>
                        </div>
                    </div>
                `
            },
            'CAM': {
                title: "CAM Photosynthesis",
                subtitle: "Crassulacean Acid Metabolism - Temporal separation (e.g., cacti, succulents).",
                content: `
                    <div class="flex flex-col md:flex-row gap-6 mt-4">
                        <div class="flex-1 space-y-2">
                            <p class="text-sm text-slate-600"><strong>Adaptation:</strong> Extreme water conservation by opening stomata only at night.</p>
                            <ul class="list-disc pl-5 text-sm text-slate-600 space-y-1">
                                <li><strong>Night:</strong> Stomata open. CO2 fixed into organic acids and stored in vacuoles.</li>
                                <li><strong>Day:</strong> Stomata close (saves water). Light reactions provide ATP/NADPH. Stored acids release CO2 to Rubisco for the Calvin cycle.</li>
                            </ul>
                        </div>
                        <div class="flex-1 bg-amber-50 p-4 rounded border border-amber-100 flex items-center justify-center text-center">
                            <p class="text-sm font-medium text-amber-800">Maximizes water use efficiency. Slow growth rate but allows survival in extreme arid environments.</p>
                        </div>
                    </div>
                `
            },
            'Resp': {
                title: "Cellular Respiration",
                subtitle: "Breaking down sugars to release energy (ATP) for cellular work.",
                content: `
                    <div class="space-y-4 mt-4">
                        <p class="text-sm text-slate-600">While photosynthesis builds sugars, respiration breaks them down. Plants do both.</p>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                            <div class="bg-slate-50 p-3 rounded border border-slate-200">
                                <strong class="text-slate-800 block text-sm mb-1">1. Glycolysis</strong>
                                <p class="text-xs text-slate-500">Occurs in Cytosol. Splits glucose into pyruvate. Yields small amount of ATP and NADH.</p>
                            </div>
                            <div class="bg-slate-50 p-3 rounded border border-slate-200">
                                <strong class="text-slate-800 block text-sm mb-1">2. Krebs Cycle</strong>
                                <p class="text-xs text-slate-500">Occurs in Mitochondrial Matrix. Fully oxidizes carbon. Releases CO2, generates NADH and FADH2.</p>
                            </div>
                            <div class="bg-slate-50 p-3 rounded border border-slate-200">
                                <strong class="text-slate-800 block text-sm mb-1">3. Electron Transport</strong>
                                <p class="text-xs text-slate-500">Occurs on Inner Mitochondrial Membrane. Uses electrons from NADH/FADH2 to pump protons, driving massive ATP synthesis. O2 is final acceptor.</p>
                            </div>
                        </div>
                    </div>
                `
            }
        };

        const hormoneData = {
            'Auxins': `
                <h5 class="text-lg font-bold text-green-700 border-b pb-1 mb-2">Auxins (e.g., IAA)</h5>
                <p class="text-sm text-slate-600 mb-2"><strong>Primary Role:</strong> Cell elongation, apical dominance, and tissue differentiation.</p>
                <ul class="list-disc pl-5 text-sm text-slate-600 space-y-2">
                    <li>Produced primarily in shoot apical meristems and young leaves, transported downward (polar transport).</li>
                    <li><strong>Acid Growth Hypothesis:</strong> Auxin stimulates proton pumps in the plasma membrane, lowering cell wall pH. This activates expansin enzymes that loosen the wall matrix, allowing turgor pressure to elongate the cell.</li>
                    <li>Inhibits lateral bud growth (apical dominance) ensuring upward growth towards light.</li>
                </ul>
            `,
            'Gibberellins': `
                <h5 class="text-lg font-bold text-green-700 border-b pb-1 mb-2">Gibberellins (GAs)</h5>
                <p class="text-sm text-slate-600 mb-2"><strong>Primary Role:</strong> Stem elongation, fruit growth, and seed germination.</p>
                <ul class="list-disc pl-5 text-sm text-slate-600 space-y-2">
                    <li>Work in concert with auxins to promote dramatic internode elongation by stimulating both cell division and elongation.</li>
                    <li><strong>Seed Germination:</strong> Water imbibition triggers GA release from the embryo. GA signals the aleurone layer to secrete digestive enzymes (like alpha-amylase) which hydrolyze endosperm starches into sugars for the growing seedling.</li>
                </ul>
            `,
            'Cytokinins': `
                <h5 class="text-lg font-bold text-green-700 border-b pb-1 mb-2">Cytokinins</h5>
                <p class="text-sm text-slate-600 mb-2"><strong>Primary Role:</strong> Control of cell division (cytokinesis) and differentiation.</p>
                <ul class="list-disc pl-5 text-sm text-slate-600 space-y-2">
                    <li>Produced mainly in actively growing tissues, particularly roots, embryos, and fruits. Transported upward via xylem.</li>
                    <li><strong>Ratio with Auxin:</strong> The balance determines differentiation. High Auxin/Low Cytokinin = root formation. Low Auxin/High Cytokinin = shoot/bud formation. Equal ratio = undifferentiated callus.</li>
                    <li>Delay leaf senescence (aging) by directing nutrient flow to tissues.</li>
                </ul>
            `,
            'Ethylene': `
                <h5 class="text-lg font-bold text-amber-600 border-b pb-1 mb-2">Ethylene (Gas)</h5>
                <p class="text-sm text-slate-600 mb-2"><strong>Primary Role:</strong> Response to stress, senescence, leaf abscission, and fruit ripening.</p>
                <ul class="list-disc pl-5 text-sm text-slate-600 space-y-2">
                    <li><strong>Fruit Ripening:</strong> Triggers enzymatic breakdown of cell walls and conversion of starches to sugars. Operates on a positive feedback loop (ripening produces more ethylene).</li>
                    <li><strong>Triple Response:</strong> When a seedling hits an obstacle (mechanical stress), ethylene induces slowing of stem elongation, stem thickening, and horizontal growth to bypass the obstacle.</li>
                </ul>
            `,
            'ABA': `
                <h5 class="text-lg font-bold text-red-600 border-b pb-1 mb-2">Abscisic Acid (ABA)</h5>
                <p class="text-sm text-slate-600 mb-2"><strong>Primary Role:</strong> Slowing growth, stress tolerance, and seed dormancy.</p>
                <ul class="list-disc pl-5 text-sm text-slate-600 space-y-2">
                    <li><strong>Seed Dormancy:</strong> High levels of ABA during seed maturation inhibit premature germination. The ratio of ABA to GA determines if a seed will germinate.</li>
                    <li><strong>Drought Tolerance:</strong> When roots detect low soil moisture, ABA is rapidly transported to leaves where it binds to guard cell receptors, causing massive efflux of K+ ions and immediate stomatal closure.</li>
                </ul>
            `
        };

        const tropismData = {
            'photo': `<div class="fade-in"><strong class="text-yellow-700 block mb-2 text-lg">Phototropism</strong><p class="text-sm text-slate-700">Growth towards light. Photoreceptors (phototropins) detect directional blue light. This triggers lateral transport of <strong>Auxin</strong> to the shaded side of the stem. Higher auxin concentration on the shaded side causes those cells to elongate faster (via the Acid Growth Hypothesis), bending the stem towards the light.</p></div>`,
            'gravi': `<div class="fade-in"><strong class="text-emerald-700 block mb-2 text-lg">Gravitropism (Geotropism)</strong><p class="text-sm text-slate-700">Growth in response to gravity. Roots show positive gravitropism (grow down), shoots show negative (grow up). In roots, specialized plastids called <strong>statoliths</strong> settle at the bottom of root cap cells. This triggers calcium signaling and redistribution of auxin to the lower side of the root, where it <em>inhibits</em> cell elongation, causing the root to bend downward.</p></div>`,
            'thigmo': `<div class="fade-in"><strong class="text-blue-700 block mb-2 text-lg">Thigmotropism</strong><p class="text-sm text-slate-700">Directional growth in response to touch. Common in climbing plants and vines. Contact with a solid object stimulates unequal growth rates on opposite sides of the stem or tendril, mediated by auxin and ethylene, causing it to coil around the support structure.</p></div>`
        };

        const stressData = {
            'heat': `<div class="fade-in"><strong class="text-red-700 block mb-2 text-lg">Response to Heat & Drought</strong><p class="text-sm text-slate-700"><strong>Drought:</strong> Roots synthesize ABA, causing rapid stomatal closure in leaves. Osmotic adjustment (accumulating compatible solutes) helps retain water.<br><strong>Heat:</strong> Synthesis of Heat-Shock Proteins (HSPs) which act as molecular chaperones to prevent other vital enzymes from denaturing under high temperatures.</p></div>`,
            'cold': `<div class="fade-in"><strong class="text-cyan-700 block mb-2 text-lg">Response to Cold & Freezing</strong><p class="text-sm text-slate-700"><strong>Cold:</strong> Alteration of cell membrane lipid composition (increasing unsaturated fatty acids) to maintain membrane fluidity.<br><strong>Freezing:</strong> Accumulation of antifreeze proteins and specific solutes (sugars) to lower the freezing point of the cytosol, preventing destructive intracellular ice crystal formation.</p></div>`,
            'wind': `<div class="fade-in"><strong class="text-slate-700 block mb-2 text-lg">Response to Wind & Air Quality</strong><p class="text-sm text-slate-700"><strong>Thigmomorphogenesis:</strong> Mechanical perturbation (wind) causes plants to develop shorter, thicker stems to prevent snapping. Mediated by increased ethylene and lignin deposition.<br><strong>Air Quality:</strong> Pollutants like ozone create Reactive Oxygen Species (ROS). Plants respond by closing stomata and producing antioxidants.</p></div>`,
            'light': `<div class="fade-in"><strong class="text-yellow-700 block mb-2 text-lg">Response to Light Quality (Shade)</strong><p class="text-sm text-slate-700"><strong>Shade Avoidance Syndrome:</strong> Canopy shade is rich in far-red light. The Phytochrome system detects this low Red to Far-Red ratio. The plant responds by rapid stem elongation (to reach sunlight), reduced leaf area, and inhibition of branching.</p></div>`,
            'pathogen': `<div class="fade-in"><strong class="text-purple-700 block mb-2 text-lg">Response to Pathogen Attack</strong><p class="text-sm text-slate-700"><strong>Hypersensitive Response (HR):</strong> Localized, rapid cell death around the infection site to starve biotrophic pathogens. Fortification of cell walls (lignin, callose) and release of toxic phytoalexins.<br><strong>Systemic Acquired Resistance (SAR):</strong> Salicylic acid acts as a mobile signal, priming defense genes in uninfected tissues for future attacks.</p></div>`,
            'herbivore': `<div class="fade-in"><strong class="text-amber-700 block mb-2 text-lg">Response to Herbivory</strong><p class="text-sm text-slate-700">Physical damage triggers systemic electrical signals and the hormone systemin, leading to Jasmonic Acid (JA) production. JA triggers expression of defense genes (e.g., protease inhibitors). Release of Volatile Organic Compounds (VOCs) to warn neighboring plants or attract parasitoid wasps.</p></div>`
        };

        let currentChart = null;

        function renderModule(id) {
            const mainContent = document.getElementById('main-content');
            const data = studyData[id];
            
            if (!data) return;

            // Update Nav styling
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.remove('active', 'text-green-800', 'bg-green-100');
                if(btn.dataset.target === id) {
                    btn.classList.add('active');
                }
            });
            document.getElementById('mobile-nav').value = id;

            // Render Content
            mainContent.innerHTML = `
                <div class="fade-in max-w-5xl mx-auto">
                    <header class="mb-6">
                        <h2 class="text-3xl font-bold text-slate-800 mb-2">${data.title}</h2>
                        <p class="text-lg text-slate-600">${data.subtitle}</p>
                    </header>
                    <div class="bg-white p-5 rounded-lg border border-slate-200 mb-6 shadow-sm border-l-4 border-l-green-500">
                        <p class="text-slate-700">${data.description}</p>
                    </div>
                    ${data.content}
                </div>
            `;

            // Specific module initialization
            if (id === 'nutrition') {
                initNutritionChart();
            } else if (id === 'photosynthesis') {
                updateCarbonFixation('C3'); // Default view
            } else if (id === 'growth') {
                showHormone('Auxins'); // Default view
            }
        }

        function initNutritionChart() {
            const ctx = document.getElementById('nutritionChart').getContext('2d');
            
            if (currentChart) {
                currentChart.destroy();
            }

            // Conceptual data for visual comparison based on typical plant tissue concentration
            currentChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Macronutrients (N, K, Ca, Mg, P, S)', 'Micronutrients (Cl, Fe, B, Mn, Zn, Cu, Mo)'],
                    datasets: [{
                        label: 'Relative Requirement (Conceptual Concentration)',
                        data: [1000, 1], // Logarithmic conceptual difference
                        backgroundColor: [
                            'rgba(22, 163, 74, 0.7)', // Green for Macro
                            'rgba(245, 158, 11, 0.7)'  // Amber for Micro
                        ],
                        borderColor: [
                            'rgba(22, 163, 74, 1)',
                            'rgba(245, 158, 11, 1)'
                        ],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.dataIndex === 0 ? 'High requirement (Structure/Energy)' : 'Trace requirement (Enzyme Co-factors)';
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            type: 'logarithmic',
                            title: {
                                display: true,
                                text: 'Relative Concentration (Log Scale)'
                            },
                            ticks: { display: false }
                        }
                    }
                }
            });
        }

        // Global functions for interactions within HTML strings
        window.updateWaterDetail = function(concept) {
            const pane = document.getElementById('water-detail-pane');
            pane.innerHTML = `<div class="fade-in">${waterDetails[concept]}</div>`;
        };

        window.updateCarbonFixation = function(type) {
            const pane = document.getElementById('bioenergetics-display');
            const data = bioenergeticsDetails[type];
            
            // Update button styles
            ['C3', 'C4', 'CAM', 'Resp'].forEach(btnType => {
                const btn = document.getElementById(`btn-${btnType}`);
                if(btnType === type) {
                    btn.className = type === 'Resp' 
                        ? "px-4 py-2 rounded-md bg-slate-800 text-white font-medium text-sm whitespace-nowrap transition-colors"
                        : "px-4 py-2 rounded-md bg-green-600 text-white font-medium text-sm whitespace-nowrap transition-colors";
                } else {
                    btn.className = "px-4 py-2 rounded-md bg-slate-100 text-slate-600 font-medium text-sm whitespace-nowrap transition-colors hover:bg-slate-200";
                }
            });

            pane.innerHTML = `
                <div class="fade-in">
                    <h3 class="text-xl font-bold text-slate-800 border-b pb-2">${data.title}</h3>
                    <p class="text-slate-500 text-sm mt-1 mb-4">${data.subtitle}</p>
                    ${data.content}
                </div>
            `;
        };

        window.showHormone = function(hormone) {
            const pane = document.getElementById('hormone-display');
            pane.innerHTML = `<div class="fade-in bg-slate-50 p-4 rounded border border-slate-200 h-full">${hormoneData[hormone]}</div>`;
        };

        window.showTropism = function(type) {
            const pane = document.getElementById('tropism-display');
            pane.innerHTML = tropismData[type];
        };

        window.triggerStress = function(type) {
            const pane = document.getElementById('stress-response-display');
            let bgClass = 'bg-slate-50 border-slate-200';
            if (type === 'heat') bgClass = 'bg-red-50 border-red-200';
            if (type === 'cold') bgClass = 'bg-cyan-50 border-cyan-200';
            if (type === 'wind') bgClass = 'bg-slate-100 border-slate-300';
            if (type === 'light') bgClass = 'bg-yellow-50 border-yellow-200';
            if (type === 'pathogen') bgClass = 'bg-purple-50 border-purple-200';
            if (type === 'herbivore') bgClass = 'bg-amber-50 border-amber-200';
            
            pane.className = `p-5 rounded border min-h-[140px] transition-all flex items-center ${bgClass}`;
            pane.innerHTML = stressData[type];
        };

        // Event Listeners
        document.getElementById('desktop-nav').addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (btn) renderModule(btn.dataset.target);
        });

        document.getElementById('mobile-nav').addEventListener('change', (e) => {
            renderModule(e.target.value);
        });

        // Initialize App
        renderModule('intro');

    </script>
</body>
</html>
